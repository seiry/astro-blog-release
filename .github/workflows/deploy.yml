name: Deploy to Cloudflare Workers

on:
  repository_dispatch:
    types: [on-demand-release]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  deployments: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    name: Build & Deploy
    steps:
      - name: Checkout to private repo
        uses: actions/checkout@v6
        with:
          repository: seiry/astro-blog
          token: ${{ secrets.GH_TOKEN_FOR_CHECKOUT }}

      - name: Cache dependencies & Astro build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            ~/.cache/yarn
            ~/.yarn/cache
            ~/.pnpm-store
            ~/.bun/install/cache
            ~/.cache/bun
            .astro
            node_modules/.cache
          key: ${{ runner.os }}-astro-${{ hashFiles('**/pnpm-lock.yaml', '**/package-lock.json', '**/npm-shrinkwrap.json', '**/yarn.lock', '**/bun.lockb', '**/bun.lock', '**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-astro-

      # Build Astro directly instead of withastro/action, which always uploads
      # a GitHub Pages artifact we don't need for a Workers deploy.
      - name: Setup pnpm (version pinned via package.json "packageManager")
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies & build site
        run: |
          pnpm install
          pnpm run build
          
      - name: Publish to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Reads wrangler.jsonc from the checked-out astro-blog repo
          # (assets.directory = ./dist) and deploys a static-assets Worker.
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }} 

